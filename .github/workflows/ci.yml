name: CI

on:
  push:
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy .

      - name: Architecture import-graph check
        run: pytest tests/architecture/test_import_graph.py -q

      - name: Documentation drift check (DEC-### integrity, README/issue-status sync)
        run: pytest tests/docs/test_doc_drift.py -v

      - name: Smoke test (GET /ready) — expected red at this phase
        run: pytest tests/api/test_ready.py -v
